name: Publish GitHub release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - custom_components/smart_yardian/manifest.json
      - .github/workflows/publish-release.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smart-yardian-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish manifest version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(jq -r '.version' custom_components/smart_yardian/manifest.json)"
          tag="v${version}"

          git ls-remote --exit-code --tags origin "refs/tags/${tag}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --latest
          else
            gh release create "${tag}" \
              --verify-tag \
              --title "Smart Yardian ${version}" \
              --generate-notes \
              --latest
          fi
